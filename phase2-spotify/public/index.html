<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodAgent — biometrics → music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="orb" aria-hidden="true"></div>

    <header>
      <div class="brand">
        <span class="logo">◖◗</span>
        <h1>MoodAgent</h1>
      </div>
      <div id="authArea" class="auth"></div>
    </header>

    <main>
      <section class="panel inputs">
        <div class="panel-head">
          <h2>Your signals</h2>
          <p class="hint">From your wearable — or just play with the sliders.</p>
        </div>

        <div class="sliders">
          <label class="slider" for="energy">
            <span class="slabel"><i>⚡</i> Energy <b id="energyVal">50</b></span>
            <input type="range" id="energy" min="0" max="100" value="50" />
          </label>

          <label class="slider" for="stress">
            <span class="slabel"><i>🌀</i> Stress <b id="stressVal">50</b></span>
            <input type="range" id="stress" min="0" max="100" value="50" />
          </label>

          <label class="slider" for="sleep">
            <span class="slabel"><i>😴</i> Sleep quality <b id="sleepVal">50</b></span>
            <input type="range" id="sleep" min="0" max="100" value="50" />
          </label>
        </div>

        <div class="presets">
          <button class="chip" data-e="80" data-s="20" data-q="75">☀️ Morning</button>
          <button class="chip" data-e="95" data-s="35" data-q="70">🏃 Workout</button>
          <button class="chip" data-e="25" data-s="75" data-q="40">🌙 Wind down</button>
          <button class="chip" data-e="55" data-s="65" data-q="30">🎯 Deep focus</button>
          <button class="chip" id="surprise">🎲 Surprise me</button>
        </div>

        <button id="recommend" class="cta">Recommend music</button>
        <div class="row-tools">
          <button id="share" class="ghost">🔗 Copy mood link</button>
        </div>
      </section>

      <section class="panel result">
        <div id="moodCard" class="mood-card hidden">
          <div class="mood-meta">
            <span class="mood-label" id="moodLabel">—</span>
            <p class="mood-blurb" id="moodBlurb"></p>
          </div>
          <div class="mood-coords">
            <div class="coord">
              <span>valence</span><b id="valenceVal">—</b>
            </div>
            <div class="coord"><span>arousal</span><b id="arousalVal">—</b></div>
          </div>
        </div>

        <div id="player" class="player hidden">
          <img id="nowArt" alt="" />
          <div class="now-meta">
            <div id="nowName" class="now-name">—</div>
            <div id="nowArtist" class="now-artist">—</div>
            <div id="playerStatus" class="player-status"></div>
          </div>
        </div>

        <div id="status" class="status"></div>
        <ul id="tracks" class="tracks"></ul>
      </section>
    </main>

    <footer>
      <span id="historyBar"></span>
    </footer>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
